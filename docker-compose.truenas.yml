version: '3.8'

services:
  resol-vbus:
    image: docker.io/iVuehl/resol-vbus-toolbox:latest
    container_name: resol-vbus-mqtt
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    environment:
      # Connection settings
      NODE_PATH: /app/src
      # MQTT URL - update to your broker address
      MQTT_URL: mqtt://192.168.178.243:1883
      # Optional MQTT credentials
      # MQTT_USERNAME: username
      # MQTT_PASSWORD: password
    command: >
      node /app/bin/resol-vbus-toolbox
      --connection SerialConnection
      --path /dev/ttyUSB0
      --script /app/scripts/mqtt-publisher.js
    restart: unless-stopped
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
