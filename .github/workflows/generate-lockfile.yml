name: Generate package-lock.json

on:
  workflow_dispatch:
  push:
    branches:
      - add/package-lock

jobs:
  gen-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Use Node and install
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and generate package-lock
        run: |
          npm install --no-audit --no-fund
          ls -la package-lock.json || true

      - name: Commit and push package-lock.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add package-lock.json (generated by workflow)"
          file_pattern: package-lock.json
          push: true