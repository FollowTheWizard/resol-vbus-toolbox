name: Security scan (Dockerfile, deps, image)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.IMAGE_NAME }}   # e.g. yourdockerhubuser/resol-vbus-toolbox

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint (Docker image)
        run: |
          echo "Running hadolint..."
          # use hadolint container to lint Dockerfile
          docker run --rm -i hadolint/hadolint < Dockerfile || true

      - name: Install node deps (for npm audit)
        run: |
          npm ci

      - name: Run npm audit (fail on high/critical)
        id: npm_audit
        run: |
          npm audit --json > npm-audit.json || true
          jq '.metadata.vulnerabilities' npm-audit.json > vuln-summary.json
          cat vuln-summary.json
          CRITICAL=$(jq '.critical' vuln-summary.json)
          HIGH=$(jq '.high' vuln-summary.json)
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          if [ "$CRITICAL" -gt "0" ] || [ "$HIGH" -gt "0" ]; then
            echo "Found high/critical npm vulnerabilities"
            exit 1
          fi

      - name: Set up QEMU and buildx
        uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build image (local tag) for scanning
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}

      - name: Run Trivy scan (container) and fail on high/critical
        id: trivy_scan
        run: |
          IMAGE=${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          echo "Scanning ${IMAGE} with Trivy..."
          # run trivy container and mount docker socket so it can access the local image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasecurity/trivy:latest \
            image --severity CRITICAL,HIGH --format json --output trivy-report.json "${IMAGE}" || true
          if [ -f trivy-report.json ]; then
            cat trivy-report.json
            CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
            HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json)
            echo "critical=${CRITICAL}" >> $GITHUB_OUTPUT
            echo "high=${HIGH}" >> $GITHUB_OUTPUT
            if [ "$CRITICAL" -gt "0" ] || [ "$HIGH" -gt "0" ]; then
              echo "Trivy found high/critical vulnerabilities (CRITICAL=$CRITICAL HIGH=$HIGH)"
              exit 1
            fi
          else
            echo "No trivy report generated"
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            npm-audit.json
            trivy-report.json
            vuln-summary.json